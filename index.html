<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Buscador de Materiales</title>
</head>
<body>

    <img src="isamsa-logo.png" alt="LogoISAM">
    <h2>Buscador de Material</h2>

    <input type="text" id="codigo" placeholder="Ingrese material">
    <button onclick="buscar()">Buscar</button>

    <p id="resultado"></p>

    <h3>Lista de Picking</h3>
    <div id="lista"></div>

    <button onclick="optimizar()">Optimizar recorrido</button>

    <script>
        let datos = [];
        let picking = [];

        // Cargar CSV
        fetch("datos.csv")
        .then(response => response.text())
        .then(texto => {
            let filas = texto.split("\n");
            for (let i = 1; i < filas.length; i++) {
                let columnas = filas[i].split(",");
                if (columnas.length >= 3) {
                    datos.push({
                        material: columnas[0].trim(),
                        ubicacion: columnas[1].trim(),
                        texto: columnas.slice(2).join(",").trim()
                    });
                }
            }
        });

    function buscar() {
    let codigo = document.getElementById("codigo").value.trim();
    let resultado = document.getElementById("resultado");

    if (!codigo) return;

    let encontrados = [];

    // 1. Buscar coincidencia exacta
    let exacto = datos.find(item => item.material === codigo);

    if (exacto) {
        encontrados = [exacto];
    } else {
        // 2. Buscar por últimos dígitos
        encontrados = datos.filter(item =>
            item.material.endsWith(codigo)
        );
    }

    // 3. Mostrar resultados
    if (encontrados.length === 1) {

        let item = encontrados[0];

        resultado.innerHTML =
            "<b>Material:</b> " + item.material + "<br>" +
            "<b>Ubicación:</b> " + item.ubicacion + "<br>" +
            "<b>Descripción:</b> " + item.texto + "<br><br>" +
            "<button onclick='agregarAPicking(" + JSON.stringify(item) + ")'>Agregar a picking</button>";

    } else if (encontrados.length > 1) {

        // Si hay varios resultados
        resultado.innerHTML = "<b>Se encontraron múltiples materiales:</b><br><br>";

        encontrados.forEach(item => {
            resultado.innerHTML +=
                item.material + " - " + item.ubicacion +
                " <button onclick='agregarAPicking(" + JSON.stringify(item) + ")'>Agregar</button><br>";
        });

    } else {
        resultado.innerHTML = "Material no encontrado";
    }
}

        function agregarAPicking(item) {
            picking.push(item);
            mostrarLista();
        }

        function mostrarLista() {
            let lista = document.getElementById("lista");
            lista.innerHTML = "";

            picking.forEach(p => {
                lista.innerHTML +=
                    "<div>" + p.material + " - " + p.ubicacion + "</div>";
            });
        }

        // Extrae número de pasillo (ej: K21-38-A → 21)
        function obtenerPasillo(ubicacion) {
            let match = ubicacion.match(/\d+/);
            return match ? parseInt(match[0]) : 999;
        }

        function optimizar() {
            picking.sort((a, b) => {
                return obtenerPasillo(a.ubicacion) - obtenerPasillo(b.ubicacion);
            });

            mostrarLista();
        }
    </script>

</body>
</html>
