<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Buscador de Materiales</title>
</head>
<body>

    <img src="isamsa-logo.png" alt="LogoISAM">
    <h2>Buscador de Material</h2>

    <input type="text" id="codigo" placeholder="Ingrese material">
    <button onclick="buscar()">Buscar</button>

    <p id="resultado"></p>

    <h3>Lista de Picking</h3>
    <div id="lista"></div>

    <button onclick="optimizar()">Optimizar recorrido</button>

    <script>
        let datos = [];
        let picking = [];

        // Cargar CSV
        fetch("datos.csv")
        .then(response => response.text())
        .then(texto => {
            let filas = texto.split("\n");
            for (let i = 1; i < filas.length; i++) {
                let columnas = filas[i].split(",");
                if (columnas.length >= 3) {
                    datos.push({
                        material: columnas[0].trim(),
                        ubicacion: columnas[1].trim(),
                        texto: columnas.slice(2).join(",").trim()
                    });
                }
            }
        });

        function buscar() {
            let codigo = document.getElementById("codigo").value.trim();
            let resultado = document.getElementById("resultado");

            let encontrado = datos.find(item => item.material === codigo);

            if (encontrado) {
                resultado.innerHTML =
                    "<b>Material:</b> " + encontrado.material + "<br>" +
                    "<b>Ubicación:</b> " + encontrado.ubicacion + "<br>" +
                    "<b>Descripción:</b> " + encontrado.texto + "<br><br>" +
                    "<button onclick='agregarAPicking(" + JSON.stringify(encontrado) + ")'>Agregar a picking</button>";
            } else {
                resultado.innerHTML = "Material no encontrado";
            }
        }

        function agregarAPicking(item) {
            picking.push(item);
            mostrarLista();
        }

        function mostrarLista() {
            let lista = document.getElementById("lista");
            lista.innerHTML = "";

            picking.forEach(p => {
                lista.innerHTML +=
                    "<div>" + p.material + " - " + p.ubicacion + "</div>";
            });
        }

        // Extrae número de pasillo (ej: K21-38-A → 21)
        function obtenerPasillo(ubicacion) {
            let match = ubicacion.match(/\d+/);
            return match ? parseInt(match[0]) : 999;
        }

        function optimizar() {
            picking.sort((a, b) => {
                return obtenerPasillo(a.ubicacion) - obtenerPasillo(b.ubicacion);
            });

            mostrarLista();
        }
    </script>

</body>
</html>
